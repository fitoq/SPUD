<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My POS">
    <title>POS System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛒 POS System</h1>
            <div class="date" id="currentDate"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Product Grid (Left Side) -->
            <div class="products-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Search products...">
                </div>
                <div class="category-buttons" id="categoryButtons">
                    <button class="cat-btn active" data-category="all">All</button>
                    <button class="cat-btn" data-category="Food">Food</button>
                    <button class="cat-btn" data-category="Drink">Drink</button>
                    <button class="cat-btn" data-category="Snack">Snack</button>
                </div>
                <div class="product-grid" id="productGrid"></div>
            </div>

            <!-- Cart Section (Right Side) -->
            <div class="cart-section">''
                <div class="cart-header">
                    <h2>Shopping Cart</h2>
                    <button class="clear-cart-btn" onclick="clearCart()">Clear All</button>
                </div>
                <div class="cart-items" id="cartItems">
                    <div class="empty-cart">Cart is empty</div>
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                </div>
                <div class="cart-actions">
                    <button class="action-btn" onclick="showPaymentModal()">💳 Checkout</button>
                    <button class="action-btn secondary" onclick="exportToCSV()">📊 Export Sales</button>
                    <button class="action-btn secondary" onclick="printReceipt()">🖨️ Print Receipt</button>
                    <button class="action-btn secondary" onclick="showSalesHistory()">📜 Sales History</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Payment</h2>
            <div class="modal-body">
                <p>Total Amount: <strong id="modalTotal">$0.00</strong></p>
                <label>Cash Received:</label>
                <input type="number" id="cashReceived" placeholder="Enter amount" step="0.01">
                <p>Change: <strong id="changeAmount">$0.00</strong></p>
                <button class="action-btn" onclick="completeSale()">Complete Sale</button>
            </div>
        </div>
    </div>

    <!-- Sales History Modal -->
    <div id="historyModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeHistoryModal()">&times;</span>
            <h2>Sales History</h2>
            <div class="modal-body" id="historyContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
